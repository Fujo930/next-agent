name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Run Python tests
        run: uv run pytest
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: NextAgentGUI/package-lock.json
      - name: Install GUI dependencies
        working-directory: NextAgentGUI
        run: npm ci
      - name: Build GUI
        working-directory: NextAgentGUI
        run: npm run build
